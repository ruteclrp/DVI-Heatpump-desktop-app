<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DVI Heatpump</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="bridge-stage">
        <div class="bridge-stage__copy">
          <div class="startup-panel">
            <p class="eyebrow">Preparing workspace</p>
            <h1>Heatpump desktop shell</h1>
            <p class="lede">Secure access to the original DVI bridge UI with local-first connection handling.</p>
            <div class="startup-preview" aria-hidden="true">
              <span class="startup-preview__pill"></span>
              <span class="startup-preview__line startup-preview__line--strong"></span>
              <span class="startup-preview__line"></span>
              <span class="startup-preview__line startup-preview__line--short"></span>
            </div>
          </div>
        </div>
      </section>
      <aside class="side-panel">
        <section class="hero hero-panel">
          <div class="panel-brand">
            <div>
              <p class="panel-title">Windows desktop shell</p>
            </div>
          </div>
          <p id="runtime-info" class="version-value"></p>
        </section>
        <section class="status-card connection-card">
          <div class="card-header">
            <div>
              <p class="eyebrow">Connection</p>
              <h2>Bridge and tunnel status</h2>
            </div>
            <button id="refresh-connection" type="button">Refresh</button>
          </div>
          <p id="connection-summary" class="summary-text"></p>
          <dl id="connection-info"></dl>
          <div class="action-row">
            <button id="open-preferred-ui" type="button">Show bridge UI</button>
            <button id="clear-stored-connection-state" type="button" class="secondary-button">
              Clear token and tunnel
            </button>
          </div>
          <p id="clear-stored-connection-status" class="summary-text"></p>
          <form id="bridge-override-form" class="pairing-form compact-form">
            <label>
              <span>Bridge URL override for VPN</span>
              <input
                id="bridge-override-url"
                name="bridgeOverrideUrl"
                type="text"
                placeholder="http://192.168.1.50 or https://bridge.example"
              />
            </label>
            <div class="action-row">
              <button id="save-bridge-override" type="submit">Save bridge URL</button>
              <button id="clear-bridge-override" type="button" class="secondary-button">Clear</button>
            </div>
          </form>
          <p id="bridge-override-status" class="summary-text"></p>
        </section>
      </aside>
    </main>
  </body>
</html>
